<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Update Comercial — Extracción</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1A2E4A; }
    p.subtitle { color: #666; margin-top: 0; }
    form { display: flex; flex-direction: column; gap: 18px; margin-top: 32px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; font-weight: 500; }
    input, select, textarea { padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .hint { font-weight: 400; color: #888; font-size: 12px; }
    button, .btn { padding: 12px; background: #1A2E4A; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; }
    button:hover, .btn:hover { background: #2E75B6; }
    .auth-block { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; align-items: stretch; }
    .session-bar { display: flex; justify-content: flex-end; margin-top: 24px; font-size: 13px; }
    .session-bar a { color: #666; text-decoration: none; }
    .session-bar a:hover { color: #1A2E4A; }

    .clientes-list { display: flex; flex-direction: column; gap: 6px; border: 1px solid #d0d0d0; border-radius: 6px; padding: 10px 12px; max-height: 320px; overflow-y: auto; background: #fafbfc; }
    .cliente-row { display: grid; grid-template-columns: auto 1fr 160px; align-items: center; gap: 10px; padding: 6px 4px; border-radius: 4px; font-weight: 400; }
    .cliente-row:hover { background: #fff; }
    .cliente-row input[type=checkbox] { width: 16px; height: 16px; margin: 0; }
    .cliente-row .cliente-name { font-size: 14px; }
    .cliente-row .cliente-name small { color: #888; font-weight: 400; margin-left: 6px; }
    .cliente-row input[type=text] { padding: 6px 8px; font-size: 13px; }
    .clientes-empty { color: #888; padding: 8px; font-style: italic; }
    .clientes-error { color: #b00020; padding: 8px; font-size: 13px; }
    .toggle-all { font-size: 12px; color: #2E75B6; cursor: pointer; user-select: none; }
    .toggle-all:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Update Comercial</h1>
  <p class="subtitle">Generar el reporte semanal a partir de los datos de Instance.</p>

  {% if authenticated %}
    <form action="/generar" method="post">
      <label>Clientes
        <span class="hint">
          Marca los que querés incluir en el reporte y completá el plan mensual (en pesos, sin separadores).
          {% if clientes_disponibles %}
            — <span class="toggle-all" onclick="toggleAll(true)">marcar todos</span> · <span class="toggle-all" onclick="toggleAll(false)">ninguno</span>
          {% endif %}
        </span>
        <div class="clientes-list">
          {% if error_clientes %}
            <div class="clientes-error">No se pudo cargar la lista de clientes: {{ error_clientes }}</div>
          {% elif not clientes_disponibles %}
            <div class="clientes-empty">No hay clientes accesibles con tu cuenta.</div>
          {% else %}
            {% for c in clientes_disponibles %}
              <label class="cliente-row">
                <input type="checkbox" name="clientes_sel" value="{{ c.cliente }}">
                <span class="cliente-name">{{ c.cliente }} <small>{{ c.pais }}</small></span>
                <input type="text" name="plan_{{ c.slug }}" placeholder="Plan mensual" inputmode="numeric">
              </label>
            {% endfor %}
          {% endif %}
        </div>
      </label>

      <label>Mes
        <input type="month" name="mes" required value="{{ default_mes }}">
      </label>
      <label>Fecha de corte
        <input type="date" name="fecha_corte" required value="{{ default_fecha_corte }}">
      </label>
      <button type="submit">Generar reporte</button>
    </form>
    <div class="session-bar"><a href="/logout">Cerrar sesion</a></div>

    <script>
      function toggleAll(state) {
        document.querySelectorAll('input[name="clientes_sel"]').forEach(cb => cb.checked = state);
      }
    </script>
  {% else %}
    <div class="auth-block">
      <p>Para generar reportes necesitas conectarte a la base de datos de Instance.</p>
      <a class="btn" href="/login">Conectar a DB</a>
    </div>
  {% endif %}
</body>
</html>
