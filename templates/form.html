<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Update Comercial — Extracción</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1A2E4A; }
    p.subtitle { color: #666; margin-top: 0; }
    form { display: flex; flex-direction: column; gap: 18px; margin-top: 32px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; font-weight: 500; }
    input, select, textarea { padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
    .hint { font-weight: 400; color: #888; font-size: 12px; }
    button, .btn { padding: 12px; background: #1A2E4A; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; }
    button:hover, .btn:hover { background: #2E75B6; }
    .btn-ghost { background: #fff; color: #1A2E4A; border: 1px solid #1A2E4A; padding: 8px 12px; font-size: 13px; }
    .btn-ghost:hover { background: #1A2E4A; color: #fff; }
    .auth-block { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; align-items: stretch; }
    .session-bar { display: flex; justify-content: flex-end; margin-top: 24px; font-size: 13px; }
    .session-bar a { color: #666; text-decoration: none; }
    .session-bar a:hover { color: #1A2E4A; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .clientes-list { display: flex; flex-direction: column; gap: 6px; border: 1px solid #d0d0d0; border-radius: 6px; padding: 10px 12px; max-height: 320px; overflow-y: auto; background: #fafbfc; }
    .cliente-row { display: grid; grid-template-columns: auto 1fr 110px 140px 120px; align-items: center; gap: 10px; padding: 6px 4px; border-radius: 4px; font-weight: 400; }
    .cliente-row .gd-input { padding: 6px 6px; font-size: 12px; }
    .cliente-row:hover { background: #fff; }
    .cliente-row input[type=checkbox] { width: 16px; height: 16px; margin: 0; }
    .cliente-row .cliente-name { font-size: 14px; }
    .cliente-row .cliente-name small { color: #888; font-weight: 400; margin-left: 6px; }
    .cliente-row input[type=text] { padding: 6px 8px; font-size: 13px; }
    .clientes-empty { color: #888; padding: 8px; font-style: italic; }
    .clientes-error { color: #b00020; padding: 8px; font-size: 13px; }
    .toggle-all { font-size: 12px; color: #2E75B6; cursor: pointer; user-select: none; }
    .toggle-all:hover { text-decoration: underline; }
    .clientes-toolbar { display: flex; gap: 12px; align-items: flex-end; margin: 4px 0 8px; }
    .clientes-toolbar #cliente-search { flex: 1; }
    .desde-field { flex: 0 0 auto; font-size: 12px; font-weight: 500; gap: 4px; }
    .desde-field input { padding: 8px 10px; }
    .no-match { color: #888; font-style: italic; padding: 8px; display: none; }

    .acciones-block { border: 1px solid #d0d0d0; border-radius: 6px; padding: 12px; background: #fafbfc; display: flex; flex-direction: column; gap: 10px; }
    .acciones-empty { color: #888; font-style: italic; font-size: 13px; padding: 6px 4px; }
    .accion-row { display: grid; grid-template-columns: 1.2fr 1.4fr 1.6fr 1fr 1fr auto; gap: 8px; align-items: center; background: #fff; padding: 8px; border-radius: 5px; border: 1px solid #e6e8eb; }
    .accion-row input, .accion-row select { padding: 6px 8px; font-size: 13px; }
    .accion-row .remove { background: none; border: none; color: #b00020; cursor: pointer; font-size: 18px; padding: 0 6px; line-height: 1; }
    .accion-row .remove:hover { color: #82071e; }
    .acciones-actions { display: flex; gap: 10px; }
    .signature { margin: 48px 0 28px; display: flex; justify-content: center; }
    .signature a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: #888; padding: 6px 14px 6px 8px; border-radius: 999px; border: 1px solid #e2e6ea; transition: color .2s, border-color .2s, background .2s; }
    .signature a:hover { color: #1A2E4A; border-color: #1A2E4A; background: #fafbfc; }
    .sig-avatar { width: 30px; height: 30px; border-radius: 50%; display: block; }
    .sig-text { display: flex; flex-direction: column; line-height: 1.2; }
    .sig-role { font-size: 10px; text-transform: uppercase; letter-spacing: .9px; color: #aaa; }
    .sig-name { font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Update Comercial</h1>
  <p class="subtitle">Generar el reporte semanal a partir de los datos de Instance.</p>

  {% if authenticated %}
    <form action="/generar" method="post">
      <label>KAM
        <input type="text" name="kam_name" value="Catalina" required>
      </label>

      <div class="row-2">
        <label>Mes
          <input type="month" name="mes" required value="{{ default_mes }}">
        </label>
        <label>Fecha de corte
          <input type="date" name="fecha_corte" required value="{{ default_fecha_corte }}">
        </label>
      </div>

      <label>Clientes
        <span class="hint">
          Marca los que querés incluir y completá el plan mensual (en pesos, sin separadores).
          Para combinar cuentas en una sola fila, poné el mismo nombre en "Grupo" en cada miembro
          (ej. Ballerina y Tienda Labach con Grupo = Ballerina); la meta del grupo es la suma de los planes de sus miembros.
          {% if clientes_disponibles %}
            — <span class="toggle-all" onclick="toggleAll(true)">marcar todos</span> · <span class="toggle-all" onclick="toggleAll(false)">ninguno</span>
          {% endif %}
        </span>
        {% if clientes_disponibles %}
        <div class="clientes-toolbar">
          <input type="text" id="cliente-search" placeholder="Buscar cliente…" autocomplete="off" oninput="filterClientes()">
          <label class="desde-field">Gráficos desde (default)
            <input type="month" name="grafico_desde" value="{{ default_grafico_desde }}">
          </label>
        </div>
        {% endif %}
        <div class="clientes-list">
          {% if error_clientes %}
            <div class="clientes-error">No se pudo cargar la lista de clientes: {{ error_clientes }}</div>
          {% elif not clientes_disponibles %}
            <div class="clientes-empty">No hay clientes accesibles con tu cuenta.</div>
          {% else %}
            {% for c in clientes_disponibles %}
              <label class="cliente-row">
                <input type="checkbox" name="clientes_sel" value="{{ c.cliente }}" onchange="syncAccionClientes()">
                <span class="cliente-name">{{ c.cliente }} <small>{{ c.pais }}</small></span>
                <input type="text" name="grupo_{{ c.slug }}" placeholder="Grupo (opcional)">
                <input type="month" class="gd-input" name="gdesde_{{ c.slug }}" title="Gráficos desde — override; vacío usa el default">
                <input type="text" name="plan_{{ c.slug }}" placeholder="Plan mensual" inputmode="numeric">
              </label>
            {% endfor %}
            <div class="no-match" id="no-match">Sin resultados para la búsqueda.</div>
          {% endif %}
        </div>
        <span class="hint">"Gráficos desde (default)" fija el mes inicial de la evolución para todos; la columna "Desde" de cada cliente lo sobrescribe (vacío = usa el default). En un grupo se usa el mes más temprano entre sus miembros.</span>
      </label>

      <label>Acciones comerciales
        <span class="hint">Una fila por acción. El cliente debe estar marcado arriba para que aparezca en el desplegable.</span>
        <div class="acciones-block">
          <div id="acciones-rows">
            <div class="acciones-empty" id="acciones-empty">Sin acciones — click "Agregar acción" para sumar la primera.</div>
          </div>
          <div class="acciones-actions">
            <button type="button" class="btn-ghost" onclick="addAccion()">+ Agregar acción</button>
          </div>
        </div>
      </label>

      <button type="submit">Generar reporte</button>
    </form>
    <div class="session-bar"><a href="/logout">Cerrar sesion</a></div>

    <template id="accion-template">
      <div class="accion-row">
        <select name="accion_cliente" required></select>
        <input type="text" name="accion_actividad" placeholder="Actividad" required>
        <input type="text" name="accion_detalle" placeholder="Pendiente / Detalle">
        <input type="date" name="accion_deadline">
        <select name="accion_estado">
          <option value="En proceso" selected>En proceso</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Listo">Listo</option>
          <option value="Bloqueado">Bloqueado</option>
        </select>
        <button type="button" class="remove" title="Quitar" onclick="removeAccion(this)">×</button>
      </div>
    </template>

    <script>
      function toggleAll(state) {
        // Solo afecta a las filas visibles (respeta el filtro de busqueda).
        document.querySelectorAll('.cliente-row').forEach(row => {
          if (row.style.display === 'none') return;
          const cb = row.querySelector('input[name="clientes_sel"]');
          if (cb) cb.checked = state;
        });
        syncAccionClientes();
      }

      function filterClientes() {
        const q = document.getElementById('cliente-search').value.trim().toLowerCase();
        let visibles = 0;
        document.querySelectorAll('.clientes-list .cliente-row').forEach(row => {
          const name = row.querySelector('.cliente-name').textContent.toLowerCase();
          const match = name.includes(q);
          row.style.display = match ? '' : 'none';
          if (match) visibles++;
        });
        const nm = document.getElementById('no-match');
        if (nm) nm.style.display = visibles === 0 ? 'block' : 'none';
      }

      function getClientesSeleccionados() {
        return Array.from(document.querySelectorAll('input[name="clientes_sel"]:checked'))
          .map(cb => cb.value);
      }

      function syncAccionClientes() {
        const selected = getClientesSeleccionados();
        document.querySelectorAll('select[name="accion_cliente"]').forEach(sel => {
          const current = sel.value;
          sel.innerHTML = '';
          if (selected.length === 0) {
            const opt = document.createElement('option');
            opt.value = '';
            opt.textContent = '— marca un cliente arriba —';
            opt.disabled = true;
            opt.selected = true;
            sel.appendChild(opt);
            return;
          }
          selected.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            if (c === current) opt.selected = true;
            sel.appendChild(opt);
          });
        });
      }

      function addAccion() {
        const empty = document.getElementById('acciones-empty');
        if (empty) empty.remove();
        const tpl = document.getElementById('accion-template');
        const node = tpl.content.firstElementChild.cloneNode(true);
        document.getElementById('acciones-rows').appendChild(node);
        syncAccionClientes();
      }

      function removeAccion(btn) {
        btn.closest('.accion-row').remove();
        const rows = document.querySelectorAll('#acciones-rows .accion-row');
        if (rows.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'acciones-empty';
          empty.id = 'acciones-empty';
          empty.textContent = 'Sin acciones — click "Agregar acción" para sumar la primera.';
          document.getElementById('acciones-rows').appendChild(empty);
        }
      }
    </script>
  {% else %}
    <div class="auth-block">
      <p>Para generar reportes necesitas conectarte a la base de datos de Instance.</p>
      <a class="btn" href="/login">Conectar a DB</a>
    </div>
  {% endif %}

  <footer class="signature">
    <a href="https://github.com/catalvarezs" target="_blank" rel="noopener">
      <img class="sig-avatar" src="https://github.com/catalvarezs.png?size=60" alt="catalvarezs en GitHub">
      <span class="sig-text">
        <span class="sig-role">Developer</span>
        <span class="sig-name">@catalvarezs</span>
      </span>
    </a>
  </footer>
</body>
</html>
